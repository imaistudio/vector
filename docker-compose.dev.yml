services:
  postgres:
    image: postgres:17
    container_name: dev-postgres-aikp
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ------------------------------------------------------------------
  #  Local S3-compatible storage (MinIO)
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: dev-minio-aikp
    environment:
      MINIO_ROOT_USER: minioadmin # match sample.env
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Browser console → http://localhost:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 30s
      timeout: 20s
      retries: 3

  # One-off job that creates a default bucket after MinIO is healthy
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/aikp-local;
      "

volumes:
  pgdata:
  minio-data:
